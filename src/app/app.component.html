<div class="pb-2">
  <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top" style="z-index: 2000;">
    <div class="container-fluid">
      <a class="navbar-brand" routerLink="">Budget Planner</a>

      <!-- Navbar Toggler Button (for smaller screens) -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard">
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/planner" data-bs-toggle="collapse"
              data-bs-target=".navbar-collapse.show">Planner</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/ledger" data-bs-toggle="collapse"
              data-bs-target=".navbar-collapse.show">Ledger</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/portfolio" data-bs-toggle="collapse"
              data-bs-target=".navbar-collapse.show">Portfolio</a>
          </li>
        </ul>

        <!-- Auth Buttons -->
        <ul class="navbar-nav ms-auto" *ngIf="!isLoggedIn">
          <li class="nav-item">
            <a class="nav-link btn btn-outline-primary btn-sm px-3" routerLink="/login" data-bs-toggle="collapse"
              data-bs-target=".navbar-collapse.show">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
        </ul>

        <!-- Profile Dropdown when logged in -->
        <ul class="navbar-nav ms-auto" *ngIf="isLoggedIn">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="profileDropdown" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              <div
                class="user-avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm"
                style="width: 32px; height: 32px; font-weight: bold; font-size: 0.9rem;">
                <i class="bi bi-person-fill"></i>
              </div>
            </a>
            <div class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 p-0 mt-2 overflow-hidden"
              aria-labelledby="profileDropdown" style="min-width: 240px;">
              <div class="bg-primary p-3 text-white text-center">
                <div
                  class="avatar-lg bg-white text-primary rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center fw-bold fs-4"
                  style="width: 60px; height: 60px;">
                  <i class="bi bi-person"></i>
                </div>
                <h6 class="mb-0 fw-bold">{{ username }}</h6>
                <small class="opacity-75">User</small>
              </div>
              <div class="p-2">
                <!-- <a class="dropdown-item rounded-3 mb-1 px-3 py-2 d-flex align-items-center" href="#">
                  <i class="bi bi-gear me-2 text-secondary"></i> Settings
                </a> -->
                <button class="dropdown-item rounded-3 px-3 py-2 d-flex align-items-center text-danger"
                  (click)="logout()">
                  <i class="bi bi-box-arrow-right me-3 fs-5"></i>
                  <span class="fw-bold">Logout</span>
                </button>
              </div>
            </div>
          </li>
        </ul>

      </div>
    </div>
  </nav>

  <router-outlet></router-outlet>
</div>
